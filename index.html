<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Punto 1: Responsividad para que se vea bien en celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Punto 5: SEO para Instagram y buscadores -->
    <title>FriendShop | Tu bazar de moda online</title>
    <meta name="description" content="La mejor selección de ropa, maquillaje y accesorios. Entregas locales y envíos seguros.">

    <!-- Meta tags para que el link se vea pro en Instagram/WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="FriendShop | Moda y Tendencia">
    <meta property="og:description" content="¡Checa nuestra nueva colección! Entregas rápidas y lo mejor en tendencia.">
    <!-- Para la imagen de abajo, sube tu logo a la carpeta 'public' como 'logo.png' -->
    <meta property="og:image" content="/logo.png"> 
    <meta property="og:url" content="https://thefriendshop.com">

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <!-- Aquí es donde React "dibuja" toda tu página -->
    <div id="root"></div>
    
    <!-- Este script es el que arranca toda la lógica de tu tienda -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
